kind = "web"
previewPath = "/"
title = "PRD Sprint Planner"
version = "1.0.0"
id = "artifacts/sprint-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19948

[services.development]
run = "pnpm --filter @workspace/sprint-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sprint-planner", "run", "build" ]
publicDir = "artifacts/sprint-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19948"
BASE_PATH = "/"
